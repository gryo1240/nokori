/* ============ 食材インデックス(BUILTINから自動生成) ============ */
function buildIndex(){
  const map = {};
  Object.values(CAT).forEach(c=>map[c]=new Map());
  BUILTIN.forEach(r=>r.ing.forEach(i=>{
    const m = map[i.c];
    m.set(i.n, (m.get(i.n)||0)+1);
  }));
  const out = {};
  Object.entries(map).forEach(([c,m])=>{
    out[c] = [...m.entries()].sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0],"ja")).map(([n])=>n);
  });
  return out;
}
const ING_INDEX = buildIndex();

/* ============ 状態 ============ */
const KEY = "nokori-v1";
const $=s=>document.querySelector(s);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw){ const s=JSON.parse(raw); if(s&&s.have) return s; } }catch(e){}
  return { have:{}, fav:{}, timeLimit:0 };
}
let S = load();
let saveFailWarned=false;
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ if(!saveFailWarned){ saveFailWarned=true; alert("端末内の保存容量がいっぱいで、変更を保存できませんでした。"); } }
}
function copyText(t,btn,doneLabel){
  const ok=()=>{ if(btn) btn.textContent=doneLabel; };
  const fb=()=>{ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); ok(); }catch(e){ alert("コピーできませんでした"); } ta.remove(); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(fb); } else fb();
}

/* ============ マッチング ============ */
function haveSet(){ return new Set(Object.keys(S.have).filter(k=>S.have[k])); }
function scoreRecipe(r, have){
  const matched = r.ing.filter(i=>have.has(i.n));
  const missing = r.ing.filter(i=>!have.has(i.n));
  return {matched:matched.length, missing, total:r.ing.length};
}
function rankedRecipes(){
  const have = haveSet();
  const tl = S.timeLimit||0;
  let list = BUILTIN.filter(r=> !tl || r.time<=tl);
  let scored = list.map(r=>({r, ...scoreRecipe(r, have)}));
  if(have.size===0){
    scored.sort((a,b)=> a.r.time-b.r.time || a.r.name.localeCompare(b.r.name,"ja"));
  } else {
    scored = scored.filter(s=>s.matched>0);
    scored.sort((a,b)=>{
      if(a.missing.length!==b.missing.length) return a.missing.length-b.missing.length;
      if(b.matched!==a.matched) return b.matched-a.matched;
      return a.r.time-b.r.time;
    });
  }
  return scored;
}

/* ============ さがすタブ ============ */
function renderSearch(){
  const el=$("#tab-search");
  const have=haveSet();
  let html="";
  html += `<div class="card">
    <p class="small" style="margin-bottom:8px">冷蔵庫にある食材をタップしてチェックすると、作れる料理から順に並びます。</p>
    ${have.size? `<div class="row"><span class="small grow">選んだ食材: ${have.size}個</span><button class="ghost" id="clearHave">クリア</button></div>` : ""}
  </div>`;
  html += `<div class="card">`;
  Object.entries(ING_INDEX).forEach(([cat,names])=>{
    if(!names.length) return;
    html += `<div class="grouphead">${esc(cat)}</div><div class="chips">` +
      names.map(n=>`<button data-ing="${esc(n)}" class="${S.have[n]?"on":""}">${esc(n)}</button>`).join("") +
      `</div>`;
  });
  html += `</div>`;
  html += `<div class="card">
    <div class="grouphead" style="margin-top:0">調理時間</div>
    <div class="seg" id="timeSeg">
      ${[0,10,15,20,30].map(t=>`<button data-t="${t}" class="${S.timeLimit===t?"on":""}">${t===0?"すべて":t+"分以内"}</button>`).join("")}
    </div>
  </div>`;
  const scored = rankedRecipes();
  html += `<h2>${have.size? `作れる料理(${scored.length}品)` : `レシピ一覧(全${scored.length}品)`}</h2>`;
  if(!scored.length){
    html += `<div class="card"><p class="small">条件に合うレシピが見つかりませんでした。食材のチェックを減らすか、調理時間の条件を広げてみてください。</p></div>`;
  } else {
    html += `<div class="card">`;
    scored.forEach(({r,matched,missing})=>{
      const fav = !!S.fav[r.id];
      let status = "";
      if(have.size>0){
        status = missing.length===0
          ? `<span class="chip ok">✅ そろってます</span>`
          : `<span class="chip need">あと${missing.length}品</span>`;
      }
      html += `<div class="rrow">
        <button class="star ${fav?"on":""}" data-fav="${r.id}" aria-label="お気に入り">${fav?"★":"☆"}</button>
        <button class="nm" data-open="${r.id}">
          <div class="t">${esc(r.name)} <span class="small">(${esc(r.main)} / ${r.time}分)</span></div>
          ${have.size>0 && missing.length>0 ? `<div class="s">あと: ${missing.map(i=>esc(i.n)).join("、")}</div>` : ""}
        </button>
        <span class="statuswrap">${status}</span>
      </div>`;
    });
    html += `</div>`;
  }
  el.innerHTML=html;
  if(have.size) $("#clearHave").onclick=()=>{ S.have={}; save(); renderSearch(); updateHead(); };
  el.querySelectorAll("[data-ing]").forEach(b=>b.onclick=()=>{
    const n=b.dataset.ing;
    if(S.have[n]) delete S.have[n]; else S.have[n]=true;
    save(); renderSearch(); updateHead();
  });
  el.querySelectorAll("#timeSeg button").forEach(b=>b.onclick=()=>{
    S.timeLimit=parseInt(b.dataset.t,10); save(); renderSearch();
  });
  el.querySelectorAll("[data-fav]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.fav;
    if(S.fav[id]) delete S.fav[id]; else S.fav[id]=true;
    save(); renderSearch();
  });
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openDetail(b.dataset.open));
}

      <ol class="steps">${stepsOf(r).map(s=>`<li>${esc(s)}</li>`).join("")}</ol></div>
    <div class="row" style="margin-top:10px">
      <button class="primary grow" id="dFav">${fav?"★ お気に入り解除":"☆ お気に入りに追加"}</button>
      ${missing.length?`<button class="ghost" id="dCopy">📋 足りない食材をコピー</button>`:""}
      <button id="dClose">閉じる</button>
    </div>
  </div></div>`;
  $("#dFav").onclick=()=>{
    if(S.fav[id]) delete S.fav[id]; else S.fav[id]=true;
    save(); m.innerHTML=""; render();
  };
  if(missing.length){
    $("#dCopy").onclick=()=>{
      const t="【買い足すもの】\n"+missing.map(i=>`・${i.n} ${i.q}${i.u}`).join("\n");
      copyText(t,$("#dCopy"),"✅ コピーしました");
    };
  }
  $("#dClose").onclick=()=>m.innerHTML="";
  $("#ov").onclick=e=>{ if(e.target.id==="ov") m.innerHTML=""; };
}

/* ============ お気に入りタブ ============ */
function renderFav(){
  const el=$("#tab-fav");
  const ids=Object.keys(S.fav).filter(id=>S.fav[id]);
  if(!ids.length){
    el.innerHTML=`<div class="card"><p class="small">料理名の☆をタップすると、ここに表示されます。</p></div>`;
    return;
  }
  const have=haveSet();
  let html=`<div class="card">`;
  ids.map(id=>BUILTIN.find(r=>r.id===id)).filter(Boolean).forEach(r=>{
    const missing=r.ing.filter(i=>!have.has(i.n));
    const s = have.size===0
      ? `<div class="s">${r.ing.map(i=>esc(i.n)).join("、")}</div>`
      : (missing.length? `<div class="s">あと: ${missing.map(i=>esc(i.n)).join("、")}</div>` : `<div class="s">選んだ食材でそろっています</div>`);
    html+=`<div class="rrow">
      <button class="star on" data-fav="${r.id}">★</button>
      <button class="nm" data-open="${r.id}">
        <div class="t">${esc(r.name)} <span class="small">(${esc(r.main)} / ${r.time}分)</span></div>
        ${s}
      </button>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
  el.querySelectorAll("[data-fav]").forEach(b=>b.onclick=()=>{
    delete S.fav[b.dataset.fav]; save(); renderFav();
  });
  el.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openDetail(b.dataset.open));
}

/* ============ 設定タブ ============ */
function renderSettings(){
  const el=$("#tab-settings");
  el.innerHTML=`
  <div class="card">
    <h2 style="margin-top:0">このアプリについて</h2>
    <p class="small">内蔵の36品のレシピから、チェックした食材で作れるものを自動で絞り込みます。分量は2人分の目安です。調味料は常備している前提で、材料には含めていません。</p>
    <p class="small" style="margin-top:6px">選んだ食材・お気に入りはこの端末の中にだけ保存されます。外部への送信はありません。</p>
  </div>
  <div class="card">
    <h2 style="margin-top:0">データ</h2>
    <div class="row">
      <button id="btnExport" class="ghost">書き出す(コピー)</button>
      <button id="btnImport" class="ghost">貼り付けて読み込む</button>
      <button id="btnReset" class="ghost" style="color:var(--warn)">全データ初期化</button>
    </div>
    <textarea id="ioArea" placeholder="書き出し結果 / 読み込み時はここに貼り付け" style="margin-top:8px"></textarea>
  </div>`;
  $("#btnExport").onclick=()=>{
    const t=JSON.stringify(S);
    $("#ioArea").value=t; copyText(t,$("#btnExport"),"✅ コピーしました");
  };
  $("#btnImport").onclick=()=>{
    try{
      const o=JSON.parse($("#ioArea").value); if(!o||!o.have) throw 0;
      S=o; save(); render(); alert("読み込みました");
    }catch(e){ alert("読み込めませんでした。書き出した文字列をそのまま貼ってください。"); }
  };
  $("#btnReset").onclick=()=>{
    if(confirm("この端末のデータをすべて消します。よろしいですか?")){
      localStorage.removeItem(KEY); location.reload();
    }
  };
}

/* ============ タブ・起動 ============ */
let tab="search";
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.addEventListener("click",()=>{ tab=b.dataset.tab; render(); });
});
function updateHead(){
  const have=haveSet();
  $("#hSub").textContent = have.size ? `食材 ${have.size}個選択中` : "";
}
function render(){
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  ["search","fav","settings"].forEach(t=>{ $("#tab-"+t).hidden=(t!==tab); });
  if(tab==="search") renderSearch();
  if(tab==="fav") renderFav();
  if(tab==="settings") renderSettings();
  updateHead();
}
render();
</script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");
</script>
</body>
</html>
